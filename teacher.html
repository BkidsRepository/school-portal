<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - B Kids</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --sidebar-w: 240px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styles */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links { list-style: none; padding: 0; margin: 0; flex: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--success); }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        .top-bar { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* UI Elements */
        .table-container { width: 100%; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-holiday { background: var(--danger); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Mobile Adjustments */
        #menuBtn { display: none; font-size: 1.5rem; background: none; border: none; cursor: pointer; }
        @media (max-width: 768px) {
            #menuBtn { display: block; }
            #sidebar { position: fixed; left: -240px; height: 100%; }
            #sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div id="userEmail" style="font-size: 0.75rem; opacity: 0.7;">Loading...</div>
            <h3 style="margin: 5px 0;">B Kids Portal</h3>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" onclick="showSection('today')">Today's Attendance</li>
            <li class="nav-item" onclick="showSection('past')">Past Attendance</li>
            <li class="nav-item" onclick="showSection('holiday')">Mark Holiday</li>
        </ul>
    </nav>

    <div id="main">
        <div class="top-bar">
            <button id="menuBtn">☰</button>
            <h2 id="sectionTitle" style="margin:0; font-size: 1.2rem;">Today's Attendance</h2>
            <div id="dateDisplay" style="font-weight: bold; color: var(--primary);"></div>
        </div>

        <div id="content">
            <div id="todaySection">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Class</th><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="stuTable"></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="submitBtn">Submit Attendance</button>
            </div>

            <div id="pastSection" style="display:none;">
                <p>Select date to view records:</p>
                <input type="date" id="historyDate" style="padding:10px; margin-bottom:15px;">
                <div id="historyResults"></div>
            </div>

            <div id="holidaySection" style="display:none;">
                <div style="text-align:center; padding: 40px 20px;">
                    <p>Click below to mark the entire school as closed for today.</p>
                    <button class="btn-holiday" id="holidayBtn">Mark Today as Holiday</button>
                </div>
            </div>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
        authDomain: "bkids-56a2a.firebaseapp.com",
        projectId: "bkids-56a2a",
        storageBucket: "bkids-56a2a.firebasestorage.app",
        messagingSenderId: "239967618667",
        appId: "1:239967618667:web:64eed50c8e1b37b703932e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

// Sidebar Toggle for Mobile
        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');

        // Section Switcher
window.showSection = (section) => {
    // 1. Switch Content Visibility
    const sections = ['today', 'past', 'holiday'];
    sections.forEach(s => document.getElementById(s + 'Section').style.display = 'none');
    document.getElementById(section + 'Section').style.display = 'block';
    
    // 2. Update Sidebar Active State (The Fix)
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    // Find the clicked item by its onclick attribute and add 'active' class
    event.currentTarget.classList.add('active');

    // 3. Update Title
    const titles = { today: "Today's Attendance", past: "Attendance History", holiday: "School Holiday" };
    document.getElementById('sectionTitle').innerText = titles[section];
    
    // 4. Close sidebar on mobile
    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
};
    

// Function to format the date as "DD Mon. YYYY"
const formatAttendanceDate = () => {
    const today = new Date();
    const options = { day: '2-digit', month: 'short', year: 'numeric' };
    
    // This creates "22 Mar 2026"
    let dateString = today.toLocaleDateString('en-GB', options);
    
    // Optional: Add the dot after the month (e.g., "Mar.")
    dateString = dateString.replace(/([a-zA-Z]{3})/, '$1.');
    
    return dateString;
};

// Apply the date to the button text
const attendanceBtn = document.getElementById('submitBtn');
attendanceBtn.innerText = `Submit Attendance for ${formatAttendanceDate()}`;
    
    // Listen for the logged-in user

    
onAuthStateChanged(auth, async (user) => {
    if (user) {
        // Display the logged-in email immediately
        const formattedDate = formatAttendanceDate();
        document.getElementById('submitBtn').innerText = `Submit Attendance for ${formattedDate}`;
        document.getElementById('userEmail').textContent = user.email;

        try {
            // Fetch teacher profile to find their assigned class
            const userDoc = await getDoc(doc(db, "users", user.uid));
            
            if (userDoc.exists()) {
                const userData = userDoc.data();
                const assignedClass = userData.assignedClass;

                if (assignedClass) {
                    // Filter students by the teacher's assigned class
                    const q = query(collection(db, "students"), where("class", "==", assignedClass));
                    const snapshot = await getDocs(q);
                    
                    const tableBody = document.getElementById('stuTable');
                    tableBody.innerHTML = ""; 

                    snapshot.forEach(sDoc => {
                        const s = sDoc.data();
                        // Construct the full name
                        const fullName = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                        
                        const row = `<tr>
                            <td>${s.class}</td>
                            <td>${fullName}</td>
                            <td><input type="checkbox" class="att" data-id="${sDoc.id}" checked> Present</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                } else {
                    document.getElementById('stuTable').innerHTML = "<tr><td colspan='3'>No class assigned.</td></tr>";
                }
            }
        } catch (error) {
            console.error("Error:", error);
        }
    } else {
        window.location.href = "login.html"; // Redirect if not logged in
    }
});

    // Attendance Submission Logic
    document.getElementById('submitBtn').onclick = async () => {
        const today = new Date().toISOString().split('T');
        const checks = document.querySelectorAll('.att');
        for (let cb of checks) {
            await setDoc(doc(db, "attendance", `${cb.dataset.id}_${today}`), {
                studentId: cb.dataset.id, 
                date: today, 
                status: cb.checked ? "present" : "absent"
            });
        }
        alert("Attendance saved for class!");
    };
</script>

</body>
</html>

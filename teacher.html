<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - B Kids</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --sidebar-w: 240px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links { list-style: none; padding: 0; margin: 0; flex: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--success); color: white; font-weight: bold; }
        .nav-carousel { color: #ffca28 !important; border-left-color: #ffca28 !important; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        .top-bar { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* Welcome Section */
        #welcomeSection {
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: var(--primary);
        }
        #welcomeSection h1 { font-size: 3rem; margin: 0; }

        /* Table UI */
        .table-container { width: 100%; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        /* CAROUSEL OVERLAY - FIXED FULL SCREEN DISPLAY */
        #carouselOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .card {
            background: white;
            width: 90%;
            max-width: 900px;
            border-radius: 30px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 50px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card-left { flex: 0 0 350px; }
        .card-left img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #f0f0f0; }

        .card-right { flex: 1; }
        .card-right h1 { font-size: 3rem; margin: 0 0 20px 0; font-weight: 900; color: #000; }
        .card-right p { font-size: 1.8rem; margin: 10px 0; color: #333; }
        .card-right strong { color: #888; font-weight: 400; width: 130px; display: inline-block; }

        .stamp {
            position: absolute;
            bottom: 40px;
            right: 40px;
            padding: 10px 30px;
            border: 8px solid;
            border-radius: 12px;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(-15deg) scale(2);
            opacity: 0;
            background: white;
            pointer-events: none;
        }
        .stamp-present { color: var(--success); border-color: var(--success); }
        .stamp-absent { color: var(--danger); border-color: var(--danger); }
        .animate-stamp { animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes stampIn { to { opacity: 0.9; transform: rotate(-15deg) scale(1); } }

        #carouselCounter { position: absolute; bottom: 40px; color: #fff; font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; }
        .close-carousel { position: absolute; top: 30px; right: 40px; font-size: 4rem; color: white; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-carousel:hover { transform: scale(1.1); }

        /* Mobile */
        #menuBtn { display: none; font-size: 1.5rem; background: none; border: none; cursor: pointer; }
        @media (max-width: 800px) {
            #menuBtn { display: block; }
            #sidebar { position: fixed; left: -240px; height: 100%; }
            #sidebar.open { left: 0; }
            .card { flex-direction: column; padding: 25px; gap: 20px; width: 95%; max-height: 90vh; overflow-y: auto; }
            .card-left { flex: 0 0 auto; width: 100%; }
            .card-left img { height: 250px; }
            .card-right h1 { font-size: 1.8rem; }
            .card-right p { font-size: 1.1rem; }
            .stamp { position: relative; bottom: 0; right: 0; transform: none; display: inline-block; margin-top: 10px; font-size: 1.5rem; padding: 5px 15px; border-width: 4px; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div id="userEmail" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 5px;">Loading...</div>
            <h3 style="margin: 0;">B Kids Portal</h3>
        </div>
        <ul class="nav-links">
            <li class="nav-item" id="nav-today">Today's Attendance</li>
            <li class="nav-item" id="nav-past">Past Attendance</li>
            <li class="nav-item nav-carousel" id="nav-carousel">▶ Play Today's Carousel</li>
        </ul>
    </nav>

    <div id="main">
        <div class="top-bar">
            <button id="menuBtn">☰</button>
            <h2 id="sectionTitle" style="margin:0;">Dashboard</h2>
            <div id="dateDisplay" style="font-weight: bold; color: var(--primary); font-size: 0.9rem;"></div>
        </div>

        <div id="content">
            <!-- Welcome -->
            <div id="welcomeSection">
                <h1>Welcome to B Kids</h1>
                <p>Select an option from the sidebar to manage your class.</p>
            </div>

            <!-- Today Section -->
            <div id="todaySection" style="display:none;">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="stuTable"><tr><td colspan="2">Loading students...</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="submitBtn">Submit Attendance</button>
            </div>

            <!-- Past Section -->
            <div id="pastSection" style="display:none;">
                <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">Select Date to View/Edit:</label>
                    <input type="date" id="historyDate" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; font-size: 1rem;">
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="pastStuTable"><tr><td colspan="2" style="text-align:center; color:#888;">Select a date above</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="updatePastBtn" style="display:none;">Update Records</button>
            </div>
        </div>
    </div>

    <!-- CAROUSEL -->
    <div id="carouselOverlay">
        <span class="close-carousel" id="closeCarousel">&times;</span>
        <div id="cardContainer"></div>
        <div id="carouselCounter"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalTeacherClass = "";
        let studentData = [];
        // FIXED: Corrected todayStr to properly extract the string part of the ISO date
        const todayStr = new Date().toISOString().split('T');

        // UI Routing
        const titles = { today: "Today's Attendance", past: "Attendance History", welcome: "Dashboard" };
        window.showSection = (section) => {
            if (section === 'carousel') { startCarousel(); return; }
            
            ['welcome', 'today', 'past'].forEach(s => {
                const el = document.getElementById(s + 'Section');
                if (el) el.style.display = s === section ? 'block' : 'none';
            });

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const navEl = document.getElementById('nav-' + section);
            if(navEl) navEl.classList.add('active');
            
            document.getElementById('sectionTitle').innerText = titles[section] || "Dashboard";
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            
            // Refresh list if switching to Today's Attendance
            if (section === 'today' && globalTeacherClass) loadTodayList();
        };

        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('nav-today').onclick = () => showSection('today');
        document.getElementById('nav-past').onclick = () => showSection('past');
        document.getElementById('nav-carousel').onclick = () => showSection('carousel');
        document.getElementById('closeCarousel').onclick = () => {
            document.getElementById('carouselOverlay').style.display = 'none';
            window.carouselActive = false;
        };

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        document.getElementById('historyDate').setAttribute('max', todayStr);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    globalTeacherClass = userDoc.data().assignedClass;
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadTodayList() {
            const table = document.getElementById('stuTable');
            table.innerHTML = "<tr><td colspan='2'>Checking records...</td></tr>";

            try {
                const q = query(collection(db, "students"), where("class", "==", globalTeacherClass));
                const sSnap = await getDocs(q);
                
                const qAtt = query(collection(db, "attendance"), where("date", "==", todayStr));
                const aSnap = await getDocs(qAtt);
                
                const attMap = {};
                aSnap.forEach(d => {
                    const data = d.data();
                    attMap[data.studentId] = data.status;
                });

                table.innerHTML = "";
                studentData = [];

                sSnap.forEach(sDoc => {
                    const s = sDoc.data();
                    const fullName = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                    const savedStatus = attMap[sDoc.id];
                    const isChecked = savedStatus === undefined ? true : (savedStatus === "present");
                    
                    studentData.push({ id: sDoc.id, ...s, fullName });

                    table.innerHTML += `
                        <tr>
                            <td>${fullName}</td>
                            <td style="text-align:center;">
                                <input type="checkbox" class="att" data-id="${sDoc.id}" ${isChecked ? 'checked' : ''}>
                            </td>
                        </tr>`;
                });
                
                if (studentData.length === 0) {
                    table.innerHTML = "<tr><td colspan='2'>No students found for this class.</td></tr>";
                }
            } catch (err) {
                console.error(err);
                table.innerHTML = "<tr><td colspan='2' style='color:red;'>Error syncing with database.</td></tr>";
            }
        }

        document.getElementById('submitBtn').onclick = async () => {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Saving...";
            const checks = document.querySelectorAll('.att');
            try {
                for (let cb of checks) {
                    await setDoc(doc(db, "attendance", `${cb.dataset.id}_${todayStr}`), {
                        studentId: cb.dataset.id, 
                        date: todayStr, 
                        status: cb.checked ? "present" : "absent"
                    });
                }
                alert("Attendance records updated!");
            } catch(e) { 
                console.error(e);
                alert("Error saving records."); 
            }
            finally { btn.disabled = false; btn.innerText = "Submit Attendance"; }
        };

        async function startCarousel() {
            if (studentData.length === 0) return alert("Please visit 'Today's Attendance' first to load data.");
            const overlay = document.getElementById('carouselOverlay');
            const container = document.getElementById('cardContainer');
            const counter = document.getElementById('carouselCounter');
            
            // Helper for generated avatars if URL is missing or broken
            const getAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=512&color=fff&font-size=0.35`;
            
            overlay.style.display = 'flex';
            window.carouselActive = true;
            
            const currentStatusMap = {};
            document.querySelectorAll('.att').forEach(cb => currentStatusMap[cb.dataset.id] = cb.checked ? "present" : "absent");

            for (let i = 0; i < studentData.length; i++) {
                if (!window.carouselActive || overlay.style.display === 'none') break;
                const s = studentData[i];
                const status = currentStatusMap[s.id] || "present";
                const photo = s.photoUrl && s.photoUrl.trim() !== "" ? s.photoUrl : getAvatar(s.fullName);
                
                counter.innerText = `Student ${i+1} of ${studentData.length}`;
                container.innerHTML = `
                    <div class="card">
                        <div class="card-left">
                            <img src="${photo}" onerror="this.src='${getAvatar(s.fullName)}'">
                        </div>
                        <div class="card-right">
                            <h1>${s.fullName}</h1>
                            <p><strong>Class</strong> : ${s.class}</p>
                            <p><strong>Roll No.</strong> : ${s.rollNo || '---'}</p>
                            <p><strong>DOB</strong> : ${s.dob || '---'}</p>
                            <div class="stamp stamp-${status}" id="stampNode">${status}</div>
                        </div>
                    </div>
                `;

                await new Promise(r => setTimeout(r, 400));
                const sn = document.getElementById('stampNode');
                if(sn) sn.classList.add('animate-stamp');
                await new Promise(r => setTimeout(r, 2500));
            }
            overlay.style.display = 'none';
        }

        document.getElementById('historyDate').addEventListener('change', async (e) => {
            const selectedDate = e.target.value;
            if (!selectedDate) return;
            const table = document.getElementById('pastStuTable');
            table.innerHTML = "<tr><td colspan='2' style='text-align:center;'>Loading...</td></tr>";
            
            const qStudents = query(collection(db, "students"), where("class", "==", globalTeacherClass));
            const qAttendance = query(collection(db, "attendance"), where("date", "==", selectedDate));
            const [sSnap, aSnap] = await Promise.all([getDocs(qStudents), getDocs(qAttendance)]);

            const attMap = {};
            aSnap.forEach(d => attMap[d.data().studentId] = d.data().status);

            table.innerHTML = "";
            sSnap.forEach(sDoc => {
                const s = sDoc.data();
                const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                const isPresent = attMap[sDoc.id] !== "absent";
                table.innerHTML += `<tr><td>${name}</td><td style="text-align:center;"><input type="checkbox" class="past-att" data-id="${sDoc.id}" ${isPresent ? "checked" : ""}></td></tr>`;
            });
            document.getElementById('updatePastBtn').style.display = "block";
        });

        document.getElementById('updatePastBtn').onclick = async () => {
            const selDate = document.getElementById('historyDate').value;
            const checks = document.querySelectorAll('.past-att');
            for (let cb of checks) {
                await setDoc(doc(db, "attendance", `${cb.dataset.id}_${selDate}`), {
                    studentId: cb.dataset.id, date: selDate, status: cb.checked ? "present" : "absent"
                });
            }
            alert("History updated!");
        };
    </script>
</body>
</html>

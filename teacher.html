const table = document.getElementById('pastStuTable');
table.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";

try {

        pinBtn.style.display = "block";
    } else {
        playBtn.style.display = "none";

}
        
        async function startCarousel() {
            if (currentStudents.length === 0) return alert("Student list not loaded.");

            const selDate = document.getElementById('historyDate').value || todayStr;
            const overlay = document.getElementById('carouselOverlay');
            const content = document.getElementById('carouselContent');
            const progress = document.getElementById('carouselProgress');

            overlay.style.display = 'flex';
            window.isCarouselRunning = true;

            const attState = {};
            const qAtt = query(collection(db, "attendance"), where("date", "==", selDate));
            const aSnap = await getDocs(qAtt);
            aSnap.forEach(d => attState[d.data().studentId] = d.data().status.toUpperCase());

            for (let i = 0; i < currentStudents.length; i++) {
                if (!window.isCarouselRunning) break;

                const s = currentStudents[i];

</div>

       async function loadPinBoardStudents() {
    const board = document.getElementById('pinBoard');
    board.innerHTML = "";
    const selDate = document.getElementById('historyDate').value || todayStr;

    try {
        const qStudents = query(collection(db, "students"), where("class", "==", globalTeacherClass));
        const sSnap = await getDocs(qStudents);

        const qAtt = query(collection(db, "attendance"), where("date", "==", selDate));
        const aSnap = await getDocs(qAtt);

        const attMap = {};
        aSnap.forEach(doc => {
            attMap[doc.data().studentId] = doc.data().status;
        });

        // ✅ STEP 1: Convert to array
        const students = [];
        sSnap.forEach(docSnap => {
            students.push({ id: docSnap.id, ...docSnap.data() });
        });

        // ✅ STEP 2: Separate
        const present = [];
        const absent = [];

        students.forEach(s => {
            if (attMap[s.id] === "present") {
                present.push(s);
            } else {
                absent.push(s);
            }
        });

        // ✅ STEP 3: Shuffle
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        shuffle(present);
        shuffle(absent);

        // ✅ STEP 4: Combine (present first)
        const finalList = [...present, ...absent];

        // ✅ STEP 5: NEW LOOP (replaces old one)
        finalList.forEach((s, index) => {
            const name = `${s.firstName} ${s.lastName}`;
            const photo = s.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}`;
            const isPresent = attMap[s.id] === "present";

            const note = document.createElement("div");
            note.className = "pin-note " + (isPresent ? "green" : "red");

            const rotate = (Math.random() * 6 - 3);
            note.style.setProperty('--rot', `${rotate}deg`);

            note.innerHTML = `
                <img src="${photo}" crossorigin="anonymous">
                <div>${name}</div>
                <div style="font-size:12px; margin-top:5px;">
                    ${isPresent ? "Present ✅" : "Absent ❌"}
                </div>`;

            board.appendChild(note);
            setTimeout(() => {
    note.classList.add("show");

    // 💥 bounce after appearing
    setTimeout(() => {
        note.classList.add("bounce");
    }, 300);

}, index * 120); // stagger delay
        });

    } catch (err) {
        console.error(err);
        board.innerHTML = "<p style='color:white'>Error loading data</p>";
    }
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - B Kids</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --sidebar-w: 240px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links { list-style: none; padding: 0; margin: 0; flex: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--success); color: white; font-weight: bold; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        .top-bar { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* UI Elements */
        .table-container { width: 100%; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        /* Carousel Overlay */
        #carouselOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
        .card {
            background: white; color: #333; width: 320px; padding: 25px;
            border-radius: 15px; text-align: center; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: cardSlide 0.5s ease-out;
        }
        @keyframes cardSlide { from { opacity: 0; transform: scale(0.8) translateY(50px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .card img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #eee; margin-bottom: 15px; background: #fafafa; }
        .card h2 { margin: 10px 0 5px; color: var(--primary); }
        .card p { margin: 3px 0; font-size: 0.9rem; color: #666; }

        .stamp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg) scale(3);
            font-size: 3rem; font-weight: 900; text-transform: uppercase;
            padding: 10px 20px; border: 6px solid; border-radius: 10px;
            opacity: 0; pointer-events: none;
        }
        .stamp-present { color: var(--success); border-color: var(--success); }
        .stamp-absent { color: var(--danger); border-color: var(--danger); }
        
        .animate-stamp { animation: stampEffect 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampEffect { to { opacity: 0.8; transform: translate(-50%, -50%) rotate(-15deg) scale(1); } }

        .close-carousel { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: #fff; }

        /* Mobile Adjustments */
        #menuBtn { display: none; font-size: 1.5rem; background: none; border: none; cursor: pointer; padding: 0 10px; }
        @media (max-width: 768px) {
            #menuBtn { display: block; }
            #sidebar { position: fixed; left: -240px; height: 100%; }
            #sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div id="userEmail" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 5px;">Loading...</div>
            <h3 style="margin: 0;">B Kids Portal</h3>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" id="nav-today">Today's Attendance</li>
            <li class="nav-item" id="nav-past">Past Attendance</li>
            <li class="nav-item" id="nav-carousel" style="color: #ffca28; font-weight: bold;">▶ Play Today's Carousel</li>
        </ul>
    </nav>

    <div id="main">
        <div class="top-bar">
            <button id="menuBtn">☰</button>
            <h2 id="sectionTitle" style="margin:0;">Today's Attendance</h2>
            <div id="dateDisplay" style="font-weight: bold; color: var(--primary); font-size: 0.9rem;"></div>
        </div>

        <div id="content">
            <div id="todaySection">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="stuTable"><tr><td colspan="2">Fetching students...</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="submitBtn">Submit Attendance</button>
            </div>

            <div id="pastSection" style="display:none;">
                <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">Select Date to View/Edit:</label>
                    <input type="date" id="historyDate" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; font-size: 1rem;" onkeydown="return false">
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="pastStuTable"><tr><td colspan="2" style="text-align:center; color:#888;">Select a date above</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="updatePastBtn" style="display:none;">Update Records</button>
            </div>
        </div>
    </div>

    <!-- CAROUSEL OVERLAY -->
    <div id="carouselOverlay">
        <span class="close-carousel" id="closeCarousel">&times;</span>
        <div id="cardContainer">
            <!-- Card injected here -->
        </div>
        <p id="carouselStatus" style="margin-top:20px; opacity:0.6;">Initializing...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalTeacherClass = "";
        const todayStr = new Date().toISOString().split('T');

        // Global cache for carousel
        let studentDataList = [];

        // UI Helpers
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.onclick = () => sidebar.classList.toggle('open');

        window.showSection = (section) => {
            if(section === 'carousel') {
                startCarousel();
                return;
            }
            document.getElementById('todaySection').style.display = 'none';
            document.getElementById('pastSection').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(section + 'Section').style.display = 'block';
            document.getElementById('nav-' + section).classList.add('active');

            const titles = { today: "Today's Attendance", past: "Attendance History" };
            document.getElementById('sectionTitle').innerText = titles[section];
            if(window.innerWidth <= 768) sidebar.classList.remove('open');
        };

        document.getElementById('nav-today').onclick = () => showSection('today');
        document.getElementById('nav-past').onclick = () => showSection('past');
        document.getElementById('nav-carousel').onclick = () => showSection('carousel');
        document.getElementById('closeCarousel').onclick = () => document.getElementById('carouselOverlay').style.display = 'none';

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        document.getElementById('historyDate').setAttribute('max', todayStr);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    globalTeacherClass = userDoc.data().assignedClass;
                    if (globalTeacherClass) loadTodayList();
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadTodayList() {
            const q = query(collection(db, "students"), where("class", "==", globalTeacherClass));
            const snap = await getDocs(q);
            const table = document.getElementById('stuTable');
            table.innerHTML = "";
            studentDataList = [];
            
            snap.forEach(sDoc => {
                const s = sDoc.data();
                const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                studentDataList.push({ 
                    id: sDoc.id, 
                    ...s, 
                    fullName: name,
                    photo: s.photoUrl || s.photo || ""
                });
                table.innerHTML += `<tr><td>${name}</td><td style="text-align:center;"><input type="checkbox" class="att" data-id="${sDoc.id}" checked></td></tr>`;
            });
        }

        document.getElementById('submitBtn').onclick = async () => {
            const checks = document.querySelectorAll('.att');
            for (let cb of checks) {
                await setDoc(doc(db, "attendance", `${cb.dataset.id}_${todayStr}`), {
                    studentId: cb.dataset.id, date: todayStr, status: cb.checked ? "present" : "absent"
                });
            }
            alert("Attendance Submitted!");
        };

        // CAROUSEL LOGIC
        async function startCarousel() {
            if (studentDataList.length === 0) return alert("Please load the student list first.");
            
            const overlay = document.getElementById('carouselOverlay');
            const container = document.getElementById('cardContainer');
            const statusText = document.getElementById('carouselStatus');
            const placeholder = "https://ui-avatars.com/api/?background=random&color=fff&size=128&name=";
            
            overlay.style.display = 'flex';
            
            // 1. Get today's attendance map from DB
            const aSnap = await getDocs(query(collection(db, "attendance"), where("date", "==", todayStr)));
            const attMap = {};
            aSnap.forEach(d => attMap[d.data().studentId] = d.data().status);

            // 2. Also check the UI checkboxes in case user hasn't saved yet
            const uiChecks = document.querySelectorAll('.att');
            const uiAttMap = {};
            uiChecks.forEach(cb => {
                uiAttMap[cb.dataset.id] = cb.checked ? "present" : "absent";
            });

            for (let i = 0; i < studentDataList.length; i++) {
                const s = studentDataList[i];
                // Prioritize UI state if available, then DB state, then default to "present"
                const status = uiAttMap[s.id] || attMap[s.id] || "present";
                const studentImg = s.photo || (placeholder + encodeURIComponent(s.fullName));
                
                statusText.innerText = `Displaying ${i+1} of ${studentDataList.length}`;
                
                container.innerHTML = `
                    <div class="card">
                        <img src="${studentImg}" 
                             alt="Student Photo" 
                             onerror="this.src='${placeholder + encodeURIComponent(s.fullName)}'">
                        <h2>${s.fullName}</h2>
                        <p><strong>Roll No:</strong> ${s.rollNo || '---'}</p>
                        <p><strong>Class:</strong> ${s.class}</p>
                        <p><strong>DOB:</strong> ${s.dob || '---'}</p>
                        <div class="stamp ${status === 'absent' ? 'stamp-absent' : 'stamp-present'}" id="stampNode">
                            ${status.toUpperCase()}
                        </div>
                    </div>
                `;

                // Delay for card slide-in, then trigger stamp
                await new Promise(r => setTimeout(r, 600));
                const stamp = document.getElementById('stampNode');
                if(stamp) stamp.classList.add('animate-stamp');
                
                // Show card for 2.5 seconds
                await new Promise(r => setTimeout(r, 2500));
                
                if (overlay.style.display === 'none') break;
            }

            statusText.innerText = "Carousel Finished.";
            setTimeout(() => { if(overlay.style.display === 'flex') overlay.style.display = 'none'; }, 1500);
        }

        // Past Attendance Logic
        document.getElementById('historyDate').addEventListener('change', async (e) => {
            const selDate = e.target.value;
            if(!selDate) return;
            const table = document.getElementById('pastStuTable');
            table.innerHTML = "<tr><td colspan='2' style='text-align:center;'>Loading records...</td></tr>";
            
            try {
                const qS = query(collection(db, "students"), where("class", "==", globalTeacherClass));
                const qA = query(collection(db, "attendance"), where("date", "==", selDate));
                const [sSnap, aSnap] = await Promise.all([getDocs(qS), getDocs(qA)]);
                const attMap = {};
                aSnap.forEach(d => attMap[d.data().studentId] = d.data().status);

                table.innerHTML = "";
                sSnap.forEach(sDoc => {
                    const s = sDoc.data();
                    const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                    const isAbsent = attMap[sDoc.id] === "absent";
                    table.innerHTML += `<tr><td>${name}</td><td style="text-align:center;"><input type="checkbox" class="past-att" data-id="${sDoc.id}" ${isAbsent ? "" : "checked"}></td></tr>`;
                });
                document.getElementById('updatePastBtn').style.display = "block";
            } catch (e) { 
                console.error(e);
                table.innerHTML = "<tr><td colspan='2' style='color:red;'>Error loading past records.</td></tr>";
            }
        });

        document.getElementById('updatePastBtn').onclick = async () => {
            const selDate = document.getElementById('historyDate').value;
            const checks = document.querySelectorAll('.past-att');
            for (let cb of checks) {
                await setDoc(doc(db, "attendance", `${cb.dataset.id}_${selDate}`), {
                    studentId: cb.dataset.id, date: selDate, status: cb.checked ? "present" : "absent"
                });
            }
            alert("Records updated successfully!");
        };
    </script>
</body>
</html>

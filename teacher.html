<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - B Kids</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --sidebar-w: 240px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links { list-style: none; padding: 0; margin: 0; flex: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--success); color: white; font-weight: bold; }
        .nav-carousel { color: #ffca28 !important; border-left-color: #ffca28 !important; margin-top: 10px; font-weight: bold; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; position: relative; }
        .top-bar { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* Welcome Screen */
        #welcomeSection {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--primary);
        }
        #welcomeSection h1 { font-size: 3rem; margin-bottom: 10px; }
        #welcomeSection p { font-size: 1.2rem; opacity: 0.7; }

        /* Tables */
        .table-container { width: 100%; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        /* FULL SCREEN CAROUSEL */
        #carouselOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; z-index: 9999; display: none;
            align-items: center; justify-content: center;
        }
        
        .carousel-card {
            display: flex; width: 90%; max-width: 1200px; align-items: center;
            justify-content: space-between; position: relative; padding: 20px;
        }

        .carousel-left {
    flex: 0 0 70%; /* takes 50% of screen */
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes zoomIn {
    0% {
        transform: scale(0.85);
        opacity: 0;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

.carousel-left img {
    width: 100%;
    max-width: 800px;
    height: 90vh;
    object-fit: contain;
    border-radius: 15px;

    animation: zoomIn 0.8s ease; /* 🔥 animation */
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

        .carousel-right { flex: 1; padding-left: 50px; position: relative; animation: fadeIn 1s ease; }
        .carousel-right h1 {
            font-size: 4rem; font-weight: 900; text-transform: uppercase;
            margin: 0 0 40px 0; line-height: 1; color: black;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
        .carousel-right p { font-size: 2.2rem; font-weight: 800; margin: 15px 0; color: black; }
        .carousel-right span { color: #333; }

        .carousel-stamp {
            position: absolute; bottom: -80px; right: 0; border: 10px solid;
            padding: 15px 40px; font-size: 3.5rem; font-weight: 900;
            text-transform: uppercase; border-radius: 15px;
            transform: rotate(-15deg) scale(2); opacity: 0;
            background: white; transition: 0.3s;
        }
        .stamp-present { color: var(--success); border-color: var(--success); }
        .stamp-absent { color: var(--danger); border-color: var(--danger); }
        .stamp-animate { opacity: 0.8; transform: rotate(-15deg) scale(1); }

        .carousel-close { position: absolute; top: 20px; right: 30px; font-size: 3rem; cursor: pointer; color: #ccc; z-index: 10001; }
        #carouselProgress { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #888; font-size: 1.2rem; }

        @media (max-width: 900px) {
            .carousel-card { flex-direction: column; text-align: center; }
            .carousel-right { padding-left: 0; margin-top: 30px; }
            .carousel-right h1 { font-size: 2.5rem; }
            .carousel-right p { font-size: 1.5rem; }
            .carousel-left img { max-width: 300px; }
            .carousel-stamp { position: relative; bottom: 0; transform: none; display: inline-block; margin-top: 20px; font-size: 2rem; border-width: 5px; opacity: 1; }
        }

/* PIN BOARD FULL SCREEN */
#pinBoardOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    display: none;
    z-index: 9999;
}

#pinBoard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 20px;
    padding: 180px 40px 40px;
    justify-items: center;
}

.pin-board {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    /* 🎯 Corkboard look */
    background: url('https://www.transparenttextures.com/patterns/cork-board.png');
    background-color: #c8a165;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
}
        
.pin-note {
    position: relative; /* ✅ NOT absolute */
    width: 140px;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    color: white;

    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s ease;
}

/* Hover effect */
.pin-note:hover {
    transform: scale(1.05) rotate(0deg) !important;
    z-index: 10;
}

/* Image */
.pin-note img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

/* Colors */
.pin-note.green {
    background: #2ecc71;
}

.pin-note.red {
    background: #ff6b6b;
}
        
/* Close Button */
.pin-close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 3rem;
    color: white;
    cursor: pointer;
    z-index: 10000;
}
/* HEADER */
.pin-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10000; }

.pin-header h1 {
    margin: 0;
    font-size: 2.5rem;
    color: #2c3e50;
    font-weight: 900;
}

.pin-header h2 {
    margin: 5px 0 0;
    font-size: 1.5rem;
    color: #555;
}        

.pin-header p {
    margin-top: 8px;
    font-size: 1.1rem;
    color: #777;
    font-weight: 500;
}
.pin-note.green {
    background: #2ecc71;
    transform: rotate(-3deg);
}

.pin-note.red {
    background: #ff6b6b;
    transform: rotate(2deg);
}        

.pin-note::before {
    content: "";
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    
    width: 14px;
    height: 14px;
    background: #e74c3c;
    border-radius: 50%;
    box-shadow: 0 2px 5px rgba(0,0,0,0.4);
}
        
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div id="userEmail" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 5px;">Loading...</div>
            <h3 style="margin: 0;">B Kids Portal</h3>
        </div>
        <ul class="nav-links">
            <li class="nav-item" id="nav-att">Attendance</li>
            <li class="nav-item nav-carousel" id="nav-play">▶ Play Today's Carousel</li>
            <li class="nav-item" id="nav-pin">📌 Pin Board</li>
        </ul>
    </nav>

    <div id="main">
        <div class="top-bar">
            <button id="menuBtn" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">☰</button>
            <h2 id="sectionTitle" style="margin:0;">Dashboard</h2>
            <div id="dateDisplay" style="font-weight: bold; color: var(--primary); font-size: 0.9rem;"></div>
        </div>

        <div id="content">
            <!-- Welcome Section -->
            <div id="welcomeSection">
                <h1>Welcome to B Kids</h1>
                <p>Please select an option from the sidebar to begin.</p>
            </div>

            <!-- Attendance Section -->
            <div id="attSection" style="display:none;">
                <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">Select Date:</label>
                    <input type="date" id="historyDate" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; font-size: 1rem;">
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="pastStuTable"><tr><td colspan="2" style="text-align:center; color:#888;">Select a date</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="updatePastBtn" style="display:none;">Save Attendance</button>
            </div>
        </div>
    </div>

    <!-- CAROUSEL MODAL -->
    <div id="carouselOverlay">
        <div class="carousel-close" id="closeCarousel">&times;</div>
        <div id="carouselContent"></div>
        <div id="carouselProgress"></div>
    </div>

    <!-- PIN BOARD -->
<div id="pinBoardOverlay">
    <div class="pin-close" id="closePin">&times;</div>

    <div class="pin-board">

        <div class="pin-header">
            <h1>B Kids</h1>
            <h2 id="pinClass"></h2>
            <p id="pinDate"></p>
        </div>

        <!-- 🔥 IMPORTANT CONTAINER -->
        <div id="pinBoard"></div>

    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalTeacherClass = "";
        let currentStudents = [];
        const todayStr = new Date().toISOString().split('T')[0];

        // UI Logic
        const sidebar = document.getElementById('sidebar');
        document.getElementById('menuBtn').onclick = () => sidebar.classList.toggle('open');
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        document.getElementById('historyDate').setAttribute('max', todayStr);

        window.showSection = (section) => {
            document.getElementById('welcomeSection').style.display = 'none';
            document.getElementById('attSection').style.display = section === 'att' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + section);
            if (activeNav) activeNav.classList.add('active');
            
            document.getElementById('sectionTitle').innerText = "Attendance Management";
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
        };

        document.getElementById('nav-att').onclick = () => showSection('att');
        document.getElementById('nav-play').onclick = () => startCarousel();
        document.getElementById('closeCarousel').onclick = () => {
            document.getElementById('carouselOverlay').style.display = 'none';
            window.isCarouselRunning = false;
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
                
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        globalTeacherClass = userDoc.data().assignedClass;
document.getElementById('pinClass').innerText = "Class: " + (globalTeacherClass || "All Classes");
                        
                        
                        // Pre-load student list for carousel usage
                        const q = query(collection(db, "students"), where("class", "==", globalTeacherClass));
                        const snap = await getDocs(q);
                        
                        currentStudents = [];
                        snap.forEach(sDoc => {
                            const s = sDoc.data();
                            const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                            currentStudents.push({ id: sDoc.id, fullName: name, ...s });
                        });
                    }
                } catch (err) {
                    console.error("Auth sync error:", err);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function startCarousel() {
            if (currentStudents.length === 0) return alert("Student list not loaded. Please wait or refresh.");
            
            const selDateInput = document.getElementById('historyDate').value;
            const selDate = selDateInput ? selDateInput : todayStr;
            const overlay = document.getElementById('carouselOverlay');
            const content = document.getElementById('carouselContent');
            const progress = document.getElementById('carouselProgress');
            
            overlay.style.display = 'flex';
            window.isCarouselRunning = true;

            // Fetch attendance for the currently selected date (or today) for the carousel
            const attState = {};
            const qAtt = query(collection(db, "attendance"), where("date", "==", selDate));
            const aSnap = await getDocs(qAtt);
            aSnap.forEach(d => attState[d.data().studentId] = d.data().status.toUpperCase());

            for (let i = 0; i < currentStudents.length; i++) {
                if (!window.isCarouselRunning) break;
                const s = currentStudents[i];
                const status = attState[s.id] || 'NOT MARKED';
                
                const avatarFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.fullName)}&background=3498db&size=512&color=fff&font-size=0.35`;

                progress.innerText = `Displaying ${i + 1} of ${currentStudents.length} (${selDate})`;

content.innerHTML = ""; // reset first

setTimeout(() => {
    content.innerHTML = `
        <div class="carousel-card">
            <div class="carousel-left">
                <img src="${s.photo || avatarFallback}" 
                     onerror="this.src='${avatarFallback}'; this.onerror=null;" 
                     alt="${s.fullName}">
            </div>
            <div class="carousel-right">
                <h1>${s.fullName}</h1>
                <p>Class : <span>${s.class}</span></p>
                <p>Roll No. <span>${s.rollNo || '---'}</span></p>
                <p>DOB : <span>${s.dob || '---'}</span></p>
                <div class="carousel-stamp stamp-${status.toLowerCase()}" id="activeStamp">${status}</div>
            </div>
        </div>
    `;
}, 50);
                

                setTimeout(() => {
                    const st = document.getElementById('activeStamp');
                    if(st) st.classList.add('stamp-animate');
                }, 300);

                await new Promise(r => setTimeout(r, 4000));
            }
            overlay.style.display = 'none';
        }

        document.getElementById('historyDate').addEventListener('change', async (e) => {
            const selectedDate = e.target.value;
            if (!selectedDate) return;
            const table = document.getElementById('pastStuTable');
            table.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";

            try {
                const qStudents = query(collection(db, "students"), where("class", "==", globalTeacherClass));
                const qAtt = query(collection(db, "attendance"), where("date", "==", selectedDate));
                const [sSnap, aSnap] = await Promise.all([getDocs(qStudents), getDocs(qAtt)]);

                const map = {};
                aSnap.forEach(d => map[d.data().studentId] = d.data().status);

                table.innerHTML = "";
                sSnap.forEach(sDoc => {
                    const s = sDoc.data();
                    const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                    const isPresent = map[sDoc.id] === "present";
                    const hasRecord = map[sDoc.id] !== undefined;
                    
                    // Default to checked (present) if no record exists for the selected date
                    const checkVal = hasRecord ? isPresent : true;

                    table.innerHTML += `
                        <tr>
                            <td>${name}</td>
                            <td style="text-align:center;">
                                <input type="checkbox" class="past-att" data-id="${sDoc.id}" ${checkVal ? "checked" : ""}>
                            </td>
                        </tr>`;
                });
                document.getElementById('updatePastBtn').style.display = "block";
            } catch (err) {
                table.innerHTML = "<tr><td colspan='2'>Error loading attendance data.</td></tr>";
            }
        });

        document.getElementById('updatePastBtn').onclick = async () => {
            const selDate = document.getElementById('historyDate').value;
            if (!selDate) return;
            const btn = document.getElementById('updatePastBtn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const checks = document.querySelectorAll('.past-att');
            try {
                for (let cb of checks) {
                    await setDoc(doc(db, "attendance", `${cb.dataset.id}_${selDate}`), {
                        studentId: cb.dataset.id, date: selDate, status: cb.checked ? "present" : "absent"
                    });
                }
                alert("Attendance saved successfully for " + selDate);
            } catch (err) {
                alert("Update failed: " + err.message);
            } finally {
                btn.innerText = "Save Attendance";
                btn.disabled = false;
            }
        };








        
async function loadPinBoardStudents() {
    const board = document.getElementById('pinBoard');
    board.innerHTML = "";

    const selDate = document.getElementById('historyDate').value || todayStr;

    try {
        // ✅ Fetch students
        const qStudents = query(collection(db, "students"), where("class", "==", globalTeacherClass));
        const sSnap = await getDocs(qStudents);

        // ✅ Fetch attendance
        const qAtt = query(collection(db, "attendance"), where("date", "==", selDate));
        const aSnap = await getDocs(qAtt);

        const attMap = {};
        aSnap.forEach(doc => {
            attMap[doc.data().studentId] = doc.data().status;
        });

        // 🔁 LOOP THROUGH STUDENTS
        sSnap.forEach(docSnap => {
            const s = docSnap.data();
            const id = docSnap.id;

            const name = `${s.firstName} ${s.lastName}`;
            const photo = s.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}`;

            const isPresent = attMap[id] === "present";

            const note = document.createElement("div");
            note.className = "pin-note " + (isPresent ? "green" : "red");



            // 🎯 RANDOM ROTATION
const rotate = (Math.random() * 6 - 3);
note.style.transform = `rotate(${rotate}deg)`;

            note.innerHTML = `
                <img src="${photo}">
                <div>${name}</div>
                <div style="font-size:12px; margin-top:5px;">
                    ${isPresent ? "Present ✅" : "Absent ❌"}
                </div>
            `;

            board.appendChild(note);
        });

    } catch (err) {
        console.error("Pinboard error:", err);
        board.innerHTML = "<p style='color:white'>Error loading data</p>";
    }
}




        
        
        
const today = new Date();

const formattedDate = today.toLocaleDateString('en-GB', {
    day: '2-digit',
    month: 'long',
    year: 'numeric'
});

document.getElementById('pinDate').innerText = "Today: " + formattedDate;
        
        // OPEN PIN BOARD
document.getElementById('nav-pin').onclick = async () => {
    document.getElementById('pinBoardOverlay').style.display = 'block';
    await loadPinBoardStudents(); // 🔥 LOAD DATA
};

// CLOSE PIN BOARD
document.getElementById('closePin').onclick = () => {
    document.getElementById('pinBoardOverlay').style.display = 'none';
};
    </script>
</body>
</html>

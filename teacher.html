<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - B Kids</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --sidebar-w: 240px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links { list-style: none; padding: 0; margin: 0; flex: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--success); color: white; font-weight: bold; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        .top-bar { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* UI Elements */
        .table-container { width: 100%; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        /* Mobile Adjustments */
        #menuBtn { display: none; font-size: 1.5rem; background: none; border: none; cursor: pointer; padding: 0 10px; }
        @media (max-width: 768px) {
            #menuBtn { display: block; }
            #sidebar { position: fixed; left: -240px; height: 100%; }
            #sidebar.open { left: 0; }
            .top-bar h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div id="userEmail" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 5px;">Loading...</div>
            <h3 style="margin: 0;">B Kids Portal</h3>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" id="nav-today">Today's Attendance</li>
            <li class="nav-item" id="nav-past">Past Attendance</li>
        </ul>
    </nav>

    <div id="main">
        <div class="top-bar">
            <button id="menuBtn">☰</button>
            <h2 id="sectionTitle" style="margin:0;">Today's Attendance</h2>
            <div id="dateDisplay" style="font-weight: bold; color: var(--primary); font-size: 0.9rem;"></div>
        </div>

        <div id="content">
            <div id="todaySection">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="stuTable"><tr><td colspan="2">Fetching students...</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="submitBtn">Submit Attendance</button>
            </div>

            <div id="pastSection" style="display:none;">
<div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
<label style="font-weight:bold; display:block; margin-bottom:5px;">Select Date to View/Edit:</label>
<input type="date" id="historyDate" 
       style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; font-size: 1rem;"
       onkeydown="return false"> ```
</div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Student Name</th><th style="text-align:center;">Status</th></tr></thead>
                        <tbody id="pastStuTable"><tr><td colspan="2" style="text-align:center; color:#888;">Select a date above</td></tr></tbody>
                    </table>
                </div>
                <button class="btn-submit" id="updatePastBtn" style="display:none;">Update Records</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
// 1. Get today's date in YYYY-MM-DD format
const todayStr = new Date().toISOString().split('T');

// 2. Set the 'max' attribute on the date picker
const dateInput = document.getElementById('historyDate');
dateInput.setAttribute('max', todayStr);

// 3. Optional: Default the picker to today's date
dateInput.value = todayStr;

// 4. Add a secondary check inside your 'change' event listener
dateInput.addEventListener('change', async (e) => {
    const selectedDate = e.target.value;
    
    if (selectedDate > todayStr) {
        alert("Error: You cannot record attendance for future dates.");
        e.target.value = todayStr; // Reset to today
        return;
    }
    
    // ... rest of your existing loadHistory logic ...
});
        let globalTeacherClass = "";

        // UI Helpers
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.onclick = () => sidebar.classList.toggle('open');

        window.showSection = (section) => {
            document.getElementById('todaySection').style.display = 'none';
            document.getElementById('pastSection').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + section).classList.add('active');

            document.getElementById('sectionTitle').innerText = titles[section];
            if(window.innerWidth <= 768) sidebar.classList.remove('open');
        };

        // Wire up nav buttons
        document.getElementById('nav-today').onclick = () => showSection('today');
        document.getElementById('nav-past').onclick = () => showSection('past');

        // Date Display
        const today = new Date();
        document.getElementById('dateDisplay').innerText = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

        // Load Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    globalTeacherClass = userDoc.data().assignedClass;
                    if (globalTeacherClass) loadTodayList();
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadTodayList() {
            const q = query(collection(db, "students"), where("class", "==", globalTeacherClass));
            const snap = await getDocs(q);
            const table = document.getElementById('stuTable');
            table.innerHTML = "";
            snap.forEach(sDoc => {
                const s = sDoc.data();
                const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
                table.innerHTML += `<tr><td>${name}</td><td style="text-align:center;"><input type="checkbox" class="att" data-id="${sDoc.id}" checked></td></tr>`;
            });
        }

        // Submit Today
        document.getElementById('submitBtn').onclick = async () => {
            const dateKey = new Date().toISOString().split('T');
            const checks = document.querySelectorAll('.att');
            for (let cb of checks) {
                await setDoc(doc(db, "attendance", `${cb.dataset.id}_${dateKey}`), {
                    studentId: cb.dataset.id, date: dateKey, status: cb.checked ? "present" : "absent"
                });
            }
            alert("Attendance Submitted!");
        };

        // Load Past Logic
// 1. Add the Change Event Listener
document.getElementById('historyDate').addEventListener('change', async (e) => {
    const selectedDate = e.target.value;
    if (!selectedDate) return;

    const table = document.getElementById('pastStuTable');
    table.innerHTML = "<tr><td colspan='2' style='text-align:center;'>Loading records for " + selectedDate + "...</td></tr>";
    
    // Hide update button while loading
    document.getElementById('updatePastBtn').style.display = "none";

    try {
        if (!globalTeacherClass) {
            table.innerHTML = "<tr><td colspan='2' style='color:red;'>Error: Class not identified. Refresh page.</td></tr>";
            return;
        }

        // Fetch Students and Attendance simultaneously
        const qStudents = query(collection(db, "students"), where("class", "==", globalTeacherClass));
        const qAttendance = query(collection(db, "attendance"), where("date", "==", selectedDate));
        
        const [sSnap, aSnap] = await Promise.all([getDocs(qStudents), getDocs(qAttendance)]);

        const attMap = {};
        aSnap.forEach(d => attMap[d.data().studentId] = d.data().status);

        table.innerHTML = "";
        if (sSnap.empty) {
            table.innerHTML = "<tr><td colspan='2' style='text-align:center;'>No students found for " + globalTeacherClass + "</td></tr>";
            return;
        }

        sSnap.forEach(sDoc => {
            const s = sDoc.data();
            const name = `${s.firstName} ${s.fatherName ? s.fatherName + ' ' : ''}${s.lastName}`;
            const isAbsent = attMap[sDoc.id] === "absent";
            
            table.innerHTML += `
                <tr>
                    <td>${name}</td>
                    <td style="text-align:center;">
                        <input type="checkbox" class="past-att" data-id="${sDoc.id}" ${isAbsent ? "" : "checked"}>
                    </td>
                </tr>`;
        });

        // Show update button once list is ready
        document.getElementById('updatePastBtn').style.display = "block";

    } catch (error) {
        console.error("Auto-load error:", error);
        table.innerHTML = `<tr><td colspan='2' style='color:red;'>Permission Error: Check Firestore Rules for 'attendance' collection.</td></tr>`;
    }
});

        // Update Past
        document.getElementById('updatePastBtn').onclick = async () => {
            const selDate = document.getElementById('historyDate').value;
            const checks = document.querySelectorAll('.past-att');
            for (let cb of checks) {
                await setDoc(doc(db, "attendance", `${cb.dataset.id}_${selDate}`), {
                    studentId: cb.dataset.id, date: selDate, status: cb.checked ? "present" : "absent"
                });
            }
            alert("Records Updated!");
        };
    </script>
</body>
</html>

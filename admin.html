<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Kids Admin - Padgha Portal</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #2c3e50;
            --danger: #c0392b;
            --success: #27ae60;
            --light: #f4f7f6;
            --secondary: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); display: flex; height: 100vh; flex-direction: row; }

        /* --- Sidebar (Desktop) --- */
        #sidebar { 
            width: var(--sidebar-width); 
            background: var(--primary); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            transition: 0.3s;
        }
        #sidebar h2 { color: white; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-align: center; font-size: 1.2rem;}
        
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.7); text-align: left; padding: 12px 15px; width: 100%; cursor: pointer; font-size: 1rem; border-radius: 5px; margin-bottom: 5px;}
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; font-weight: bold; }
        
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        #header { background: white; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #view-area { flex: 1; padding: 20px; overflow-y: auto; }

        /* --- Responsive Grid --- */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #ddd; margin-bottom: 20px; }
        
        /* Desktop: 3 columns | Tablet: 2 columns | Mobile: 1 column */
        .form-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .primary { background: var(--primary); color: white; }

        /* --- Table Responsiveness --- */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        thead { background: var(--primary); color: white; }

        /* --- MOBILE STYLES (Media Query) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            #sidebar { 
                width: 100%; 
                height: auto; 
                padding: 10px; 
                flex-direction: row; 
                justify-content: space-around; 
                align-items: center;
                box-sizing: border-box;
            }
            #sidebar h2 { display: none; } /* Hide title on mobile to save space */
            .nav-btn { width: auto; margin-bottom: 0; padding: 8px 12px; font-size: 0.9rem; }
            
            #header h1 { font-size: 1.1rem; }
            .form-row { grid-template-columns: 1fr; } /* Stack inputs vertically */
            
            .modal-content { width: 95%; padding: 15px; }
        }

        /* Edit Modal */
        #editModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 800px; overflow-y: auto; max-height: 90vh; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>B Kids Admin</h2>
        <button class="nav-btn active">Students</button>
        <button class="nav-btn">Inquiries</button>
        <button onclick="logout()" class="nav-btn" style="color: #ff7675;">Logout</button>
    </div>

    <div id="main-content">
        <div id="header">
            <h1>B Kids, Padgha</h1>
            <div id="adminEmail" style="font-size: 0.8rem; opacity: 0.7;">Admin</div>
        </div>

        <div id="view-area">
            <div class="card">
                <h3 style="margin-top:0">Add New Student</h3>
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="fName"></div>
                    <div class="form-group"><label>Middle Name</label><input type="text" id="mName"></div>
                    <div class="form-group"><label>Surname</label><input type="text" id="lName"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Mother's Name</label><input type="text" id="momName"></div>
                    <div class="form-group"><label>DOB</label><input type="date" id="dob"></div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Class</label>
                        <select id="stuClass"><option value="Jr. KG">Jr. KG</option><option value="Sr. KG">Sr. KG</option></select>
                    </div>
                    <div style="grid-column: span 2; display: flex; align-items: flex-end;">
                        <button class="btn primary" id="addBtn" style="width: 100%;">Save Record</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Registered Students</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Full Name</th>
                                <th>Class</th>
                                <th>Gender</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stuBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ADD STUDENT ---
        document.getElementById('addBtn').onclick = async () => {
            const data = {
                firstName: document.getElementById('fName').value,
                middleName: document.getElementById('mName').value,
                lastName: document.getElementById('lName').value,
                motherName: document.getElementById('momName').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                class: document.getElementById('stuClass').value,
                createdAt: new Date()
            };

            if(data.firstName && data.lastName) {
                await addDoc(collection(db, "students"), data);
                alert("New Student Profile Saved!");
                location.reload();
            } else { alert("First Name and Surname are mandatory."); }
        };

        // --- LOAD LIST ---
        async function loadStudents() {
            const stuBody = document.getElementById('stuBody');
            stuBody.innerHTML = "";
            const snapshot = await getDocs(query(collection(db, "students"), orderBy("firstName")));
            
            snapshot.forEach(sDoc => {
                const s = sDoc.data();
                // COMBINING NAMES FOR DISPLAY
                const fullDisplayName = `${s.firstName} ${s.middleName || ''} ${s.lastName}`;
                
                const row = `<tr>
                    <td style="font-weight:bold;">${fullDisplayName}</td>
                    <td>${s.class}</td>
                    <td>${s.motherName || '-'}</td>
                    <td>${s.gender}</td>
                    <td>
                        <button class="btn" style="color:var(--secondary)" onclick="openEdit('${sDoc.id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})">Edit</button>
                        <button class="btn" style="color:var(--danger)" onclick="deleteStu('${sDoc.id}')">Delete</button>
                    </td>
                </tr>`;
                stuBody.innerHTML += row;
            });
        }
        loadStudents();

        // --- EDIT LOGIC ---
        window.openEdit = (id, data) => {
            document.getElementById('editId').value = id;
            document.getElementById('efName').value = data.firstName;
            document.getElementById('emName').value = data.middleName || "";
            document.getElementById('elName').value = data.lastName;
            document.getElementById('emomName').value = data.motherName || "";
            document.getElementById('edob').value = data.dob || "";
            document.getElementById('egender').value = data.gender;
            document.getElementById('eClass').value = data.class;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            const updatedData = {
                firstName: document.getElementById('efName').value,
                middleName: document.getElementById('emName').value,
                lastName: document.getElementById('elName').value,
                motherName: document.getElementById('emomName').value,
                dob: document.getElementById('edob').value,
                gender: document.getElementById('egender').value,
                class: document.getElementById('eClass').value
            };
            await updateDoc(doc(db, "students", id), updatedData);
            alert("Student Profile Updated!");
            location.reload();
        };

        window.closeModal = () => document.getElementById('editModal').style.display = 'none';
        window.deleteStu = async (id) => { if(confirm("Delete this student permanently?")) { await deleteDoc(doc(db, "students", id)); location.reload(); } };
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Kids Admin - Padgha Portal</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #2c3e50;
            --danger: #c0392b;
            --light: #f4f7f6;
            --secondary: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); display: flex; height: 100vh; flex-direction: row; }

        /* Sidebar & Layout */
        #sidebar { width: var(--sidebar-width); background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.7); text-align: left; padding: 12px 15px; width: 100%; cursor: pointer; font-size: 1rem; border-radius: 5px; margin-bottom: 5px;}
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; font-weight: bold; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: white; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #view-area { flex: 1; padding: 20px; overflow-y: auto; }

        /* Responsive Form */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #ddd; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .primary { background: var(--primary); color: white; }

        /* Table & Images */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        thead { background: var(--primary); color: white; }
        .student-thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; background: #eee; }

        /* Mobile View Adjustment */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; justify-content: space-around; padding: 10px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="font-size: 1.2rem; text-align:center;">B Kids Admin</h2>
        <button class="nav-btn active">Students</button>
        <button class="nav-btn">Inquiries</button>
        <button onclick="logout()" class="nav-btn" style="color: #ff7675;">Logout</button>
    </div>

    <div id="main-content">
        <div id="header">
            <h1>B Kids, Padgha</h1>
            <div id="adminEmail" style="font-size: 0.8rem; opacity: 0.7;">Admin</div>
        </div>

        <div id="view-area">
            <div class="card">
                <h3 style="margin-top:0">Add New Student</h3>
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="fName"></div>
                    <div class="form-group"><label>Middle Name</label><input type="text" id="mName"></div>
                    <div class="form-group"><label>Surname</label><input type="text" id="lName"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Mother's Name</label><input type="text" id="momName"></div>
                    <div class="form-group"><label>DOB</label><input type="date" id="dob"></div>
                    <div class="form-group">
                        <label>Class</label>
                        <select id="stuClass"><option value="Jr. KG">Jr. KG</option><option value="Sr. KG">Sr. KG</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Student Photo</label>
                        <input type="file" id="photoFile" accept="image/*">
                    </div>
                    <div style="grid-column: span 2; display: flex; align-items: flex-end;">
                        <button class="btn primary" id="addBtn" style="width: 100%;">Upload & Save Record</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Registered Students</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Full Name</th>
                                <th>Class</th>
                                <th>Gender</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stuBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- ADD STUDENT WITH PHOTO ---
        document.getElementById('addBtn').onclick = async () => {
            const btn = document.getElementById('addBtn');
            const file = document.getElementById('photoFile').files;
            const firstName = document.getElementById('fName').value;
            const lastName = document.getElementById('lName').value;

            if(!firstName || !lastName) { alert("Name is required"); return; }
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            let photoUrl = "";
            if (file) {
                const storageRef = ref(storage, 'student_photos/' + Date.now() + "_" + file.name);
                const uploadTask = await uploadBytes(storageRef, file);
                photoUrl = await getDownloadURL(uploadTask.ref);
            }

            const data = {
                firstName: firstName,
                middleName: document.getElementById('mName').value,
                lastName: lastName,
                motherName: document.getElementById('momName').value,
                dob: document.getElementById('dob').value,
                class: document.getElementById('stuClass').value,
                photo: photoUrl,
                createdAt: new Date()
            };

            await addDoc(collection(db, "students"), data);
            alert("Student Profile Saved!");
            location.reload();
        };

        // --- LOAD LIST ---
        const snapshot = await getDocs(query(collection(db, "students"), orderBy("firstName")));
        const stuBody = document.getElementById('stuBody');
        
        snapshot.forEach(sDoc => {
            const s = sDoc.data();
            const photoImg = s.photo ? `<img src="${s.photo}" class="student-thumb">` : `<div class="student-thumb" style="display:flex; align-items:center; justify-content:center; font-size:10px; color:#999;">No Photo</div>`;
            
            const row = `<tr>
                <td>${photoImg}</td>
                <td style="font-weight:bold;">${s.firstName} ${s.middleName || ''} ${s.lastName}</td>
                <td>${s.class}</td>
                <td>${s.motherName || '-'}</td>
                <td>
                    <button onclick="delStu('${sDoc.id}')" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>
                </td>
            </tr>`;
            stuBody.innerHTML += row;
        });

        window.delStu = async (id) => { if(confirm("Delete student?")) { await deleteDoc(doc(db, "students", id)); location.reload(); } };
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Kids Admin - Padgha Portal</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #2c3e50;
            --danger: #c0392b;
            --success: #27ae60;
            --light: #f4f7f6;
            --secondary: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar & Layout */
        #sidebar { width: var(--sidebar-width); background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar h2 { color: white; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-align: center;}
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.7); text-align: left; padding: 12px 15px; width: 100%; cursor: pointer; font-size: 1rem; border-radius: 5px; margin-bottom: 5px;}
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; font-weight: bold; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: white; padding: 15px 30px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #view-area { flex: 1; padding: 30px; overflow-y: auto; }

        /* Form Grid System */
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #ddd; margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .primary { background: var(--primary); color: white; }
        .primary:hover { background: #1a252f; }

        /* Table & Modals */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        thead { background: var(--primary); color: white; }
        
        /* Edit Modal Styling */
        #editModal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 800px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>B Kids Dashboard</h2>
        <button class="nav-btn active">🏫 Students</button>
        <button class="nav-btn">📩 Admissions</button>
        <div style="flex-grow:1"></div>
        <button onclick="logout()" class="btn" style="background:var(--danger); color:white;">Logout</button>
    </div>

    <div id="main-content">
        <div id="header">
            <h1>Student Management</h1>
            <div id="adminEmail" style="font-weight:bold;">Admin</div>
        </div>

        <div id="view-area">
            <div class="card">
                <h3 style="margin-top:0">Add New Student Profile</h3>
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="fName"></div>
                    <div class="form-group"><label>Middle Name</label><input type="text" id="mName"></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="lName"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Mother's Name</label><input type="text" id="momName"></div>
                    <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" style="grid-template-columns: 1fr 2fr;">
                    <div class="form-group">
                        <label>Class</label>
                        <select id="stuClass">
                            <option value="Jr. KG">Jr. KG</option>
                            <option value="Sr. KG">Sr. KG</option>
                            <option value="Nursery">Nursery</option>
                        </select>
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <button class="btn primary" id="addBtn">Save Student Record</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Registered Students</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Class</th>
                            <th>Mother's Name</th>
                            <th>Gender</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stuBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <h3>Update Student Information</h3>
            <input type="hidden" id="editId">
            <div class="form-row">
                <input type="text" id="efName" placeholder="First Name">
                <input type="text" id="emName" placeholder="Middle Name">
                <input type="text" id="elName" placeholder="Last Name">
            </div>
            <div class="form-row">
                <input type="text" id="emomName" placeholder="Mother's Name">
                <input type="date" id="edob">
                <select id="egender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-row">
                <select id="eClass">
                    <option value="Jr. KG">Jr. KG</option>
                    <option value="Sr. KG">Sr. KG</option>
                </select>
                <button class="btn primary" onclick="saveEdit()">Update Changes</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ADD STUDENT ---
        document.getElementById('addBtn').onclick = async () => {
            const data = {
                firstName: document.getElementById('fName').value,
                middleName: document.getElementById('mName').value,
                lastName: document.getElementById('lName').value,
                motherName: document.getElementById('momName').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                class: document.getElementById('stuClass').value,
                year: "2026-27"
            };

            if(data.firstName && data.lastName) {
                await addDoc(collection(db, "students"), data);
                alert("Student profile created!");
                location.reload();
            } else { alert("Please enter at least First and Last name."); }
        };

        // --- LOAD LIST ---
        const snapshot = await getDocs(query(collection(db, "students"), orderBy("firstName")));
        snapshot.forEach(sDoc => {
            const s = sDoc.data();
            const fullName = `${s.firstName} ${s.lastName}`;
            const row = `<tr>
                <td>${fullName}</td>
                <td>${s.class}</td>
                <td>${s.motherName || '-'}</td>
                <td>${s.gender}</td>
                <td>
                    <button class="btn" style="color:var(--secondary)" onclick="openEdit('${sDoc.id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})">Edit</button>
                    <button class="btn" style="color:var(--danger)" onclick="deleteStu('${sDoc.id}')">Delete</button>
                </td>
            </tr>`;
            document.getElementById('stuBody').innerHTML += row;
        });

        // --- EDIT LOGIC ---
        window.openEdit = (id, data) => {
            document.getElementById('editId').value = id;
            document.getElementById('efName').value = data.firstName;
            document.getElementById('emName').value = data.middleName;
            document.getElementById('elName').value = data.lastName;
            document.getElementById('emomName').value = data.motherName;
            document.getElementById('edob').value = data.dob;
            document.getElementById('egender').value = data.gender;
            document.getElementById('eClass').value = data.class;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            const updatedData = {
                firstName: document.getElementById('efName').value,
                middleName: document.getElementById('emName').value,
                lastName: document.getElementById('elName').value,
                motherName: document.getElementById('emomName').value,
                dob: document.getElementById('edob').value,
                gender: document.getElementById('egender').value,
                class: document.getElementById('eClass').value
            };
            await updateDoc(doc(db, "students", id), updatedData);
            alert("Updated!");
            location.reload();
        };

        window.closeModal = () => document.getElementById('editModal').style.display = 'none';
        window.deleteStu = async (id) => { if(confirm("Delete student?")) { await deleteDoc(doc(db, "students", id)); location.reload(); } };
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>

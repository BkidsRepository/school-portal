<!DOCTYPE html>
<html>
<head>
    <title>Admin - B Kids, Padgha</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .box { background: white; padding: 20px; border-radius: 8px; border: 2px solid #2c3e50; max-width: 600px; margin: auto; }
        input { padding: 8px; margin-bottom: 10px; width: 90%; }
        button { padding: 10px; cursor: pointer; width: 100%; }
        li { background: #eee; margin-top: 10px; padding: 10px; display: flex; justify-content: space-between; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #c0392b;">B Kids Admin Dashboard</h2>
        <input type="text" id="name" placeholder="Full Student Name">
        <input type="text" id="class" placeholder="Class (e.g., Nursery)">
        <button id="addBtn" style="background: #2c3e50; color: white;">Add Student</button>
        <ul id="list"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const stuClass = document.getElementById('class').value;
            if(name && stuClass) {
                await addDoc(collection(db, "students"), { name, class: stuClass });
                location.reload();
            }
        };

        const snapshot = await getDocs(collection(db, "students"));
        snapshot.forEach(sDoc => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${sDoc.data().name} (${sDoc.data().class})</span> <button onclick="window.del('${sDoc.id}')" style="width:auto; color:red;">Delete</button>`;
            document.getElementById('list').appendChild(li);
        });

        window.del = async (id) => { if(confirm("Delete this student?")) { await deleteDoc(doc(db, "students", id)); location.reload(); } };
    </script>
</body>
</html>

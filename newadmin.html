<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School ERP Admin</title>

<style>
:root { --primary:#2c3e50; --secondary:#3498db; --bg:#f4f7f6; }
body { margin:0; font-family:sans-serif; display:flex; height:100vh; }

#sidebar { width:250px; background:var(--primary); color:#fff; padding:20px; display:flex; flex-direction:column; }
.nav-link { padding:12px; margin-bottom:8px; background:none; border:none; color:#ccc; cursor:pointer; text-align:left; }
.nav-link.active, .nav-link:hover { background:rgba(255,255,255,0.1); color:#fff; }

#main { flex:1; display:flex; flex-direction:column; }
#header { background:#fff; padding:15px; border-bottom:1px solid #ddd; }
#content { padding:20px; overflow:auto; }

.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:20px; }
input, select { width:100%; padding:10px; margin-bottom:10px; }
button { padding:10px; cursor:pointer; }

.avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; }

#editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal { background:#fff; padding:20px; border-radius:10px; width:300px; }

</style>
</head>
<body>

<div id="sidebar">
<h2>ERP Panel</h2>
<button class="nav-link active" id="studentsTab">Students</button>
<button class="nav-link" id="usersTab">Users</button>
<button class="nav-link" id="attendanceTab">Attendance</button>
<button class="nav-link" id="inquiryTab">Inquiries</button>
</div>

<div id="main">
<div id="header">Admin Dashboard</div>
<div id="content">

<!-- STUDENTS -->
<div id="studentsSection">

<div class="card">
<h3>Add Student</h3>
<input id="fName" placeholder="First Name">
<input id="lName" placeholder="Last Name">
<input id="momName" placeholder="Mother Name">
<select id="stuClass">
<option>Jr. KG</option>
<option>Sr. KG</option>
</select>
<button id="saveBtn">Save</button>
</div>

<div class="card">
<h3>Students</h3>
<table border="1" width="100%">
<thead>
<tr><th>Photo</th><th>Name</th><th>Class</th><th>Mother</th><th>Action</th></tr>
</thead>
<tbody id="stuBody"></tbody>
</table>
</div>

</div>

<!-- USERS -->
<div id="usersSection" style="display:none;">
<div class="card">
<h3>Create User</h3>
<input id="uEmail" placeholder="Email">
<input id="uPass" placeholder="Password" type="password">
<select id="uRole">
<option value="teacher">Teacher</option>
<option value="admin">Admin</option>
</select>
<button id="createUser">Create</button>
</div>
</div>

<!-- ATTENDANCE -->
<div id="attendanceSection" style="display:none;">
<div class="card"><h3>Attendance Ready</h3></div>
</div>

<!-- INQUIRIES -->
<div id="inquirySection" style="display:none;">
<div class="card">
<h3>Inquiries</h3>
<ul id="inquiryList"></ul>
</div>
</div>

</div>
</div>

<!-- EDIT MODAL -->
<div id="editModal">
<div class="modal">
<h3>Edit Student</h3>
<input type="hidden" id="editId">
<input id="efName" placeholder="First Name">
<input id="elName" placeholder="Last Name">
<input id="emomName" placeholder="Mother Name">
<select id="eClass">
<option>Jr. KG</option>
<option>Sr. KG</option>
</select>
<button id="updateBtn">Update</button>
<button onclick="editModal.style.display='none'">Cancel</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
authDomain:"bkids-56a2a.firebaseapp.com",
projectId:"bkids-56a2a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// TAB SWITCH
const tabs = {studentsTab:"studentsSection",usersTab:"usersSection",attendanceTab:"attendanceSection",inquiryTab:"inquirySection"};
Object.keys(tabs).forEach(id=>{
document.getElementById(id).onclick=()=>{
Object.values(tabs).forEach(sec=>document.getElementById(sec).style.display="none");
document.getElementById(tabs[id]).style.display="block";
};
});

// ADD STUDENT
document.getElementById('saveBtn').onclick = async ()=>{
await addDoc(collection(db,"students"),{
firstName:fName.value,
lastName:lName.value,
motherName:momName.value,
class:stuClass.value
});
loadStudents();
};

async function loadStudents(){
const snap = await getDocs(collection(db,"students"));
const body = document.getElementById('stuBody');
body.innerHTML="";
snap.forEach(d=>{
const s = d.data();
body.innerHTML += `<tr>
<td><div class="avatar" style="background:#ccc"></div></td>
<td>${s.firstName} ${s.lastName}</td>
<td>${s.class}</td>
<td>${s.motherName}</td>
<td>
<button onclick="edit('${d.id}','${s.firstName}','${s.lastName}','${s.motherName}','${s.class}')">Edit</button>
<button onclick="del('${d.id}')">Delete</button>
</td>
</tr>`;
});
}

window.edit = (id,f,l,m,c)=>{
editModal.style.display='flex';
editId.value=id;
efName.value=f;
elName.value=l;
emomName.value=m;
eClass.value=c;
};

// UPDATE
document.getElementById('updateBtn').onclick = async ()=>{
await updateDoc(doc(db,"students",editId.value),{
firstName:efName.value,
lastName:elName.value,
motherName:emomName.value,
class:eClass.value
});
editModal.style.display='none';
loadStudents();
};

window.del = async (id)=>{
await deleteDoc(doc(db,"students",id));
loadStudents();
};
loadStudents();

// CREATE USER
document.getElementById('createUser').onclick = async ()=>{
const userCred = await createUserWithEmailAndPassword(auth,uEmail.value,uPass.value);
await setDoc(doc(db,"users",userCred.user.uid),{email:uEmail.value,role:uRole.value});
alert("User Created");
await signOut(auth);
location.reload();
};

// INQUIRIES
async function loadInquiries(){
const snap = await getDocs(collection(db,"inquiries"));
const list = document.getElementById('inquiryList');
list.innerHTML="";
snap.forEach(d=>{
list.innerHTML += `<li>${d.data().parent} - ${d.data().child}</li>`;
});
}
loadInquiries();

</script>
</body>
</html>

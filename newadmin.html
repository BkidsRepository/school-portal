<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School ERP Admin</title>

<style>
body{margin:0;font-family:sans-serif;display:flex;height:100vh;background:#f4f7f6}
#sidebar{width:250px;background:#2c3e50;color:#fff;padding:20px}
.nav-link{display:block;padding:10px;color:#ccc;cursor:pointer}
.nav-link:hover{color:#fff}
#main{flex:1;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
input,select{width:100%;padding:10px;margin-bottom:10px}
button{padding:10px;background:#3498db;color:#fff;border:none}
.avatar{width:50px;height:50px;border-radius:50%}
</style>
</head>
<body>

<div id="sidebar">
<h2>ERP Panel</h2>
<div class="nav-link">Students</div>
</div>

<div id="main">

<div class="card">
<h3>Add Student</h3>
<input id="fName" placeholder="First Name">
<input id="mName" placeholder="Middle Name">
<input id="lName" placeholder="Last Name">
<input id="momName" placeholder="Mother Name">
<select id="stuClass">
<option>Jr. KG</option>
<option>Sr. KG</option>
</select>
<input type="file" id="photoFile">
<button id="saveBtn">Save Student</button>
</div>

<div class="card">
<h3>Students</h3>
<table border="1" width="100%">
<thead>
<tr><th>Photo</th><th>Name</th><th>Class</th><th>Mother</th></tr>
</thead>
<tbody id="stuBody"></tbody>
</table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
authDomain: "bkids-56a2a.firebaseapp.com",
projectId: "bkids-56a2a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const toBase64 = file => new Promise(res=>{
const reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});

saveBtn.onclick = async ()=>{
let photo="";
if(photoFile.files[0]) photo = await toBase64(photoFile.files[0]);

await addDoc(collection(db,"students"),{
firstName:fName.value,
middleName:mName.value,
lastName:lName.value,
motherName:momName.value,
class:stuClass.value,
photo:photo
});

alert("Saved");
loadStudents();
};

async function loadStudents(){
const snap = await getDocs(collection(db,"students"));
const body = document.getElementById('stuBody');
body.innerHTML="";

snap.forEach(d=>{
const s=d.data();
body.innerHTML += `<tr>
<td>${s.photo?`<img src="${s.photo}" class="avatar">`:''}</td>
<td>${s.firstName} ${s.middleName||""} ${s.lastName}</td>
<td>${s.class}</td>
<td>${s.motherName}</td>
</tr>`;
});
}

loadStudents();
</script>

</body>
</html>

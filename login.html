<!DOCTYPE html>
<html>
<head>
    <title>Login - B Kids, Padgha</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
    </style>
</head>
<body>
    <div class="login-card">
        <h2>B Kids Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBix-KTRXdKDA1pT0VkmXbpzP6hc97CwN4",
            authDomain: "bkids-56a2a.firebaseapp.com",
            projectId: "bkids-56a2a",
            storageBucket: "bkids-56a2a.firebasestorage.app",
            messagingSenderId: "239967618667",
            appId: "1:239967618667:web:64eed50c8e1b37b703932e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "users", userCred.user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    window.location.href = role === "admin" ? "admin.html" : "teacher.html";
                } else {
                    alert("No role assigned to this user.");
                }
            } catch (error) { alert(error.message); }
        };
    </script>
</body>
</html>
